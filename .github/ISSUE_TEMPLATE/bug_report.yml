name: Bug report
description: Report something broken in PlaySG.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include browser, viewport, route, and search/filter state when relevant.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, or links are useful here. Do not include credentials.
