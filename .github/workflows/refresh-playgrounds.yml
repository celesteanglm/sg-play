name: Refresh Playground Data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate playground data
        run: npm run data:playgrounds

      - name: Verify playground data
        run: npm run data:check

      - name: Verify build
        run: npm run build

      - name: Commit updated playground data
        run: |
          if git diff --quiet -- public/data/playgrounds.json; then
            echo "No playground data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/playgrounds.json
          git commit -m "Refresh playground data"
          git push
